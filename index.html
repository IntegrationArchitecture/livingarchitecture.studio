<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Living Architecture – Atmospheric Artifacts for Space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo">LIVING ARCHITECTURE</div>
    <nav class="nav">
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About</a>
      <a href="artifacts.html">Artifacts</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <canvas id="la-environment"></canvas>

  <div class="hero-copy">
    <h1>Atmospheric artifacts for designed environments.</h1>
    <p>
      Painting, light, and diffusion composed as architectural presence—built to change how a space feels.
    </p>
    <a href="artifacts.html" class="primary-button">View Artifacts</a>
  </div>

  <script src="three.min.js"></script>
  <script>
    const canvas = document.getElementById("la-environment");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05060a);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 4);

    const light = new THREE.PointLight(0x7dd3fc, 1.6, 10);
    light.position.set(1, 1, 2);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x111827, 0.6);
    scene.add(ambient);

    const geo = new THREE.PlaneGeometry(3.4, 2.1, 64, 64);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x020617,
      roughness: 0.85,
      metalness: 0.15,
      emissive: 0x020617,
      emissiveIntensity: 0.4
    });
    const plane = new THREE.Mesh(geo, mat);
    scene.add(plane);

    function animate() {
      requestAnimationFrame(animate);
      const t = Date.now() * 0.0002;
      plane.rotation.y = Math.sin(t) * 0.12;
      plane.rotation.x = Math.cos(t * 0.7) * 0.08;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 2 - 1;
      const y = -(e.clientY / window.innerHeight) * 2 + 1;
      light.position.x = x * 2.2;
      light.position.y = y * 1.8;
    });

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>

</body>
</html>
